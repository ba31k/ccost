# Сборка standalone-бинарников (Python внутри) на тег v* — релиз с ассетами.
# Кросс-компиляции у PyInstaller нет, поэтому матрица по ОС.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest        # universal2: один бинарь на arm64 и intel
            asset: ccost-macos-universal2
            arch_flags: --target-arch universal2
          - os: ubuntu-latest
            asset: ccost-linux-x86_64
            arch_flags: ""
          - os: ubuntu-24.04-arm
            asset: ccost-linux-arm64
            arch_flags: ""
          - os: windows-latest
            asset: ccost-windows-x64.exe
            arch_flags: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Зависимости
        shell: bash
        run: |
          python -m pip install --upgrade pip pyinstaller
          if [ "$RUNNER_OS" = "Windows" ]; then
            pip install windows-curses pywebview   # TUI + нативное окно в exe
          fi
      - name: Сборка
        shell: bash
        run: |
          cp ccost ccost.py
          if [ "$RUNNER_OS" = "Windows" ]; then
            # полноценная GUI-прога (двойной клик -> окно, без консоли)
            pyinstaller --onefile --noconsole --collect-all webview \
              --name ccost ccost.py
            mv dist/ccost.exe "dist/${{ matrix.asset }}"
            # и отдельный консольный вариант для report/json/TUI
            pyinstaller --onefile --name ccost-cli ccost.py
            mv dist/ccost-cli.exe dist/ccost-windows-cli.exe
          else
            pyinstaller --onefile --name ccost ${{ matrix.arch_flags }} ccost.py
            mv dist/ccost "dist/${{ matrix.asset }}"
          fi
      - name: Смоук-тест
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            ./dist/ccost-windows-cli.exe json > /dev/null
            ./dist/${{ matrix.asset }} --probe
            grep -q '^ok$' ccost-probe.txt   # pywebview упакован в GUI-exe
          else
            ./dist/${{ matrix.asset }} json > /dev/null
          fi
      - name: ccost.app (macOS, .dmg)
        if: runner.os == 'macOS'
        run: |
          # движок внутри .app — тот же полноценный бинарь, не скрипт
          CCOST_ENGINE="$PWD/dist/${{ matrix.asset }}" sh macos/build.sh
          mkdir -p dmgroot
          cp -R macos/dist/ccost.app dmgroot/
          ln -s /Applications dmgroot/Applications
          hdiutil create -volname ccost -srcfolder dmgroot -ov -format UDZO dist/ccost-macos.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        if: runner.os == 'macOS'
        with:
          name: ccost-macos-dmg
          path: dist/ccost-macos.dmg
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        if: runner.os == 'Windows'
        with:
          name: ccost-windows-cli
          path: dist/ccost-windows-cli.exe
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: |
            Standalone-бинарники — Python не нужен.

            | файл | система |
            |---|---|
            | `ccost-macos.dmg` | macOS-приложение (окно с live-дашбордом) |
            | `ccost-windows-x64.exe` | Windows-приложение: двойной клик — своё окно |
            | `ccost-windows-cli.exe` | Windows CLI (report/json/TUI в терминале) |
            | `ccost-macos-universal2` | macOS CLI (Apple Silicon + Intel) |
            | `ccost-linux-x86_64` | Linux x86_64 |
            | `ccost-linux-arm64` | Linux arm64 |

            **macOS (.dmg)**: открыть, перетащить ccost в Applications; бинарь не
            подписан — при блокировке: `xattr -dr com.apple.quarantine /Applications/ccost.app`.
            **macOS (CLI)**: `chmod +x` и `xattr -d com.apple.quarantine` при блокировке.
            **Linux**: `chmod +x`.
            **Windows**: SmartScreen может предупредить — «Выполнить в любом случае».
