# Builds standalone binaries (Python bundled) on v* tags and attaches them
# to a GitHub release. PyInstaller cannot cross-compile, hence the OS matrix.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest        # universal2: one binary for arm64 + intel
            asset: ccost-macos-universal2
            arch_flags: --target-arch universal2
          - os: ubuntu-latest
            asset: ccost-linux-x86_64
            arch_flags: ""
          - os: ubuntu-24.04-arm
            asset: ccost-linux-arm64
            arch_flags: ""
          - os: windows-latest
            asset: ccost-windows-x64.exe
            arch_flags: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip pyinstaller
          if [ "$RUNNER_OS" = "Windows" ]; then
            pip install windows-curses pywebview   # TUI + native window in the exe
          fi
      - name: Build
        shell: bash
        run: |
          cp ccost ccost.py
          if [ "$RUNNER_OS" = "Windows" ]; then
            # GUI app (double-click opens the window, no console)
            pyinstaller --onefile --noconsole --collect-all webview \
              --name ccost ccost.py
            mv dist/ccost.exe "dist/${{ matrix.asset }}"
            # separate console build for report/json/TUI
            pyinstaller --onefile --name ccost-cli ccost.py
            mv dist/ccost-cli.exe dist/ccost-windows-cli.exe
          else
            pyinstaller --onefile --name ccost ${{ matrix.arch_flags }} ccost.py
            mv dist/ccost "dist/${{ matrix.asset }}"
          fi
      - name: Version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          v=$(grep -m1 '^VERSION = ' ccost | cut -d'"' -f2)
          [ "v$v" = "$GITHUB_REF_NAME" ] || {
            echo "VERSION $v != tag $GITHUB_REF_NAME"; exit 1; }
      - name: Smoke test
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            ./dist/ccost-windows-cli.exe json > /dev/null
            ./dist/${{ matrix.asset }} --probe
            grep -q '^ok$' ccost-probe.txt   # webview really bundled in the GUI exe
          else
            ./dist/${{ matrix.asset }} json > /dev/null
          fi
      - name: ccost.app (macOS, .dmg)
        if: runner.os == 'macOS'
        run: |
          # the engine inside the .app is the same standalone binary
          CCOST_ENGINE="$PWD/dist/${{ matrix.asset }}" sh macos/build.sh
          mkdir -p dmgroot
          cp -R macos/dist/ccost.app dmgroot/
          ln -s /Applications dmgroot/Applications
          hdiutil create -volname ccost -srcfolder dmgroot -ov -format UDZO dist/ccost-macos.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        if: runner.os == 'macOS'
        with:
          name: ccost-macos-dmg
          path: dist/ccost-macos.dmg
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        if: runner.os == 'Windows'
        with:
          name: ccost-windows-cli
          path: dist/ccost-windows-cli.exe
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: |
            Standalone binaries — no Python required.

            | file | platform |
            |---|---|
            | `ccost-macos.dmg` | macOS app (live dashboard window) |
            | `ccost-windows-x64.exe` | Windows app: double-click opens its own window |
            | `ccost-windows-cli.exe` | Windows CLI (report/json/TUI in a terminal) |
            | `ccost-macos-universal2` | macOS CLI (Apple Silicon + Intel) |
            | `ccost-linux-x86_64` | Linux x86_64 |
            | `ccost-linux-arm64` | Linux arm64 |

            **macOS (.dmg)**: open, drag ccost to Applications; the binary is
            unsigned — if Gatekeeper blocks it: `xattr -dr com.apple.quarantine /Applications/ccost.app`.
            **macOS (CLI)**: `chmod +x`, and `xattr -d com.apple.quarantine` if blocked.
            **Linux**: `chmod +x`.
            **Windows**: SmartScreen may warn — "Run anyway".
